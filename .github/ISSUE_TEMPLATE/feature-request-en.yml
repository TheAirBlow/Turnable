name: "Feature Request / Support"
description: Suggest a new feature, improvement, or ask for help with setup and usage.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea, or need some help? Fill out the form below!

  - type: dropdown
    id: kind
    attributes:
      label: Request Type
      options:
        - New feature
        - Improvement to existing feature
        - Support / usage question
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Turnable does this relate to?
      options:
        - Client
        - Server
        - Relay mode
        - P2P mode
        - Config / CLI
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve, or what are you struggling with?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you'd like to see, or what kind of help you need.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've thought about or tried?

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Anything else to add - screenshots, links, related issues, etc.
