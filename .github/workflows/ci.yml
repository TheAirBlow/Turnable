name: CI

permissions:
  contents: write

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      bump: ${{ steps.version.outputs.bump }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute version
        id: version
        run: |
          COMMIT_MSG="$(git log -1 --format='%s')"

          if echo "$COMMIT_MSG" | grep -qiF "(major)"; then
            BUMP=major
          elif echo "$COMMIT_MSG" | grep -qiF "(minor)"; then
            BUMP=minor
          elif echo "$COMMIT_MSG" | grep -qiF "(patch)"; then
            BUMP=patch
          else
            BUMP=none
          fi

          if [ "$BUMP" = "none" ]; then
            VERSION="$(git rev-parse --short=8 HEAD)"
          else
            LATEST="$(git tag -l | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)"
            if [ -z "$LATEST" ]; then
              MAJOR=0; MINOR=0; PATCH=0
            else
              IFS=. read -r MAJOR MINOR PATCH <<< "$LATEST"
            fi

            case "$BUMP" in
              major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR+1)); PATCH=0 ;;
              patch) PATCH=$((PATCH+1)) ;;
            esac

            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Build version: $VERSION"

  lint:
    name: Lint & fmt-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Run gofmt (check)
        run: |
          fmt_output=$(gofmt -l . || true)
          if [ -n "$fmt_output" ]; then
            echo "The following files need formatting:"
            echo "$fmt_output"
            echo "Run 'gofmt -w .' to fix."
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m --issues-exit-code=0 ./...
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [version]
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64   }
          - { goos: linux,   goarch: arm64   }
          - { goos: linux,   goarch: 386     }
          - { goos: linux,   goarch: arm,    goarm: "7" }
          - { goos: linux,   goarch: mipsle, gomips: softfloat }
          - { goos: linux,   goarch: mips,   gomips: softfloat }
          - { goos: linux,   goarch: riscv64 }
          - { goos: darwin,  goarch: amd64   }
          - { goos: darwin,  goarch: arm64   }
          - { goos: windows, goarch: amd64   }
          - { goos: windows, goarch: arm64   }
          - { goos: windows, goarch: 386     }
          - { goos: freebsd, goarch: amd64   }
          - { goos: freebsd, goarch: arm64   }
          - { goos: android, goarch: arm64,  cgo: "1", api: "21" }
          - { goos: android, goarch: arm,    cgo: "1", api: "21" }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Setup Android NDK
        if: matrix.goos == 'android'
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
          CGO_ENABLED: ${{ matrix.cgo || '0' }}
          ANDROID_API: ${{ matrix.api }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          if [ "$GOOS" = "android" ]; then
            if [ -z "$ANDROID_NDK_HOME" ]; then
              echo "ANDROID_NDK_HOME is not set"
              exit 1
            fi
            TOOLCHAIN_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
            if [ "$GOARCH" = "arm64" ]; then
              export CC="$TOOLCHAIN_BIN/aarch64-linux-android${ANDROID_API}-clang"
            elif [ "$GOARCH" = "arm" ]; then
              export CC="$TOOLCHAIN_BIN/armv7a-linux-androideabi${ANDROID_API}-clang"
            fi
          fi

          mkdir -p dist
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"

          go build -ldflags "-s -w -X main.buildVersion=${{ needs.version.outputs.version }}" -trimpath \
            -o "dist/turnable-${GOOS}-${GOARCH}${EXT}" \
            ./cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: turnable-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    name: Release
    needs: [version, lint, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.version.outputs.bump != 'none'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: "Turnable ${{ needs.version.outputs.version }}"
          target_commitish: ${{ github.sha }}
          files: dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
